[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    repositories: marks tests for repository layer
    api: marks tests for API layer
    helpers: marks tests for helper functions
    integration: marks integration tests
    unit: marks unit tests
    slow: marks tests as slow
